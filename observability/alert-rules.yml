groups:
  - name: host-alerts
    rules:

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance)(irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High memory usage detected"

      - alert: APIInstanceDown
        expr: up{job="video-platform-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "FastAPI instance is down"

  - name: test-alerts
    rules:
      - alert: AlwaysFiring
        expr: vector(1)
        for: 10s
        labels:
          severity: warning
        annotations:
          summary: "This is a test alert"
